<div class="table-container">
    <div class="table-header-row">
        <h2 class="table-title">Recent Activity</h2>
        <div class="header-actions">
            <button class="filter-btn">
                <span class="icon-filter"></span>
            </button>
            <a href="#" class="view-all">View all activity</a>
        </div>
    </div>

    <div class="responsive-table">
        <table class="activity-table">
            <thead>
                <tr>
                    <th>ACTIVITY</th>
                    <th>USER</th>
                    <th>STATUS</th>
                    <th>TASK PROGRESS</th>
                    <th>DATE</th>
                    <th class="amount-header">AMOUNT</th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let activity of activities">
                    <td>{{ activity.action }}</td>
                    <td>{{ activity.user }}</td>
                    <td>
                        <span class="status-pill {{ activity.statusClass }}">{{ activity.status }}</span>
                    </td>
                    <td>
                        <div class="progress-wrapper">
                            <div class="progress-bar-container">
                                <div class="progress-bar {{ activity.progressClass }}"
                                    [style.width.%]="activity.progress"></div>
                            </div>
                            <span class="progress-text">{{ activity.progress }}%</span>
                        </div>
                    </td>
                    <td class="date-cell">{{ activity.date }}</td>
                    <td class="amount-cell">{{ activity.amount }}</td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="table-footer">
        <div class="pagination-info">
            Showing <strong>1</strong> to <strong>4</strong> of <strong>42</strong> entries
        </div>
        <div class="pagination-controls">
            <button class="pagination-btn"><span class="arrow-left"></span> Previous</button>
            <button class="pagination-btn">Next <span class="arrow-right"></span></button>
        </div>
    </div>
</div>
